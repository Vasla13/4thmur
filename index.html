<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#03040a">
    <meta name="description" content="Studios du Quatrième Mur présente un catalogue corporate d'archives vidéo immersives.">
    <meta property="og:title" content="Studios du Quatrième Mur">
    <meta property="og:description" content="Archives vidéo privées. Interface corporate cyberpunk.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="public/assets/logo-quatrieme-mur.png">
    <meta name="twitter:card" content="summary_large_image">
    <title>Studios du Quatrième Mur</title>
    <link rel="icon" type="image/png" href="public/assets/favicon-64.png">
    <link rel="stylesheet" href="src/styles/styles.css">
  </head>
  <body>
    <div class="site-noise" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="#top" aria-label="Studios du Quatrième Mur">
        <img src="public/assets/logo-quatrieme-mur-web.png" alt="" width="512" height="512">
        <span>
          <strong>Quatrième Mur</strong>
          <small>Private Media System</small>
        </span>
      </a>

      <button class="nav-toggle" id="navToggle" type="button" aria-expanded="false" aria-controls="primaryNav" aria-label="Ouvrir la navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="primary-nav" id="primaryNav" aria-label="Navigation principale">
        <a href="#catalogue">Index</a>
        <a href="#contact">Accès</a>
      </nav>
    </header>

    <main id="top">
      <section class="command-hero" aria-label="Interface Studios du Quatrième Mur">
        <div class="hero-content">
          <h1>QUATRIÈME<br>MUR</h1>
        </div>

        <div class="hero-visual scanner-box">
          <div class="crosshair top-left"></div>
          <div class="crosshair top-right"></div>
          <div class="crosshair bottom-left"></div>
          <div class="crosshair bottom-right"></div>

          <div class="logo-container">
            <div class="scan-line"></div>
            <img src="public/assets/logo-quatrieme-mur-web.png" alt="Hologramme Quatrième Mur" width="512" height="512">
          </div>

          <div class="visual-footer">
            <span>OPTICAL_DRIVE_01</span>
            <span class="signal blink">SCANNING...</span>
          </div>
        </div>
      </section>

      <section class="archive-section" id="catalogue">
        <div class="archive-heading">
          <div>
            <p class="eyebrow">Baie de stockage</p>
            <h2>Jukebox Data</h2>
          </div>

          <div class="filters" role="group" aria-label="Filtrer le catalogue">
            <button class="filter-button is-active" type="button" data-filter="all">Tout</button>
            <button class="filter-button" type="button" data-filter="signature">Signature</button>
            <button class="filter-button" type="button" data-filter="prototype">Prototype</button>
            <button class="filter-button" type="button" data-filter="archive">Archive</button>
          </div>
        </div>

        <div class="archive-console">
          <div class="shard-jukebox" id="jukebox" role="group" aria-label="Dossiers vidéo">

            <button class="shard-item" type="button" data-category="signature">
              <div class="shard-pins"><span></span><span></span><span></span><span></span><span></span></div>
              <span class="shard-id">SDQM-001</span>
              <strong class="shard-title">Protocole 04</strong>
              <div class="shard-chip"></div>
            </button>

            <button class="shard-item" type="button" data-category="archive">
              <div class="shard-pins"><span></span><span></span><span></span><span></span><span></span></div>
              <span class="shard-id">SDQM-017</span>
              <strong class="shard-title">Bleu Zéro</strong>
              <div class="shard-chip"></div>
            </button>

            <button class="shard-item" type="button" data-category="prototype">
              <div class="shard-pins"><span></span><span></span><span></span><span></span><span></span></div>
              <span class="shard-id">SDQM-029</span>
              <strong class="shard-title">Memory Leak</strong>
              <div class="shard-chip"></div>
            </button>

            <button class="shard-item" type="button" data-category="signature">
              <div class="shard-pins"><span></span><span></span><span></span><span></span><span></span></div>
              <span class="shard-id">SDQM-034</span>
              <strong class="shard-title">Salle Miroir</strong>
              <div class="shard-chip"></div>
            </button>

            <button class="shard-item" type="button" data-category="prototype">
              <div class="shard-pins"><span></span><span></span><span></span><span></span><span></span></div>
              <span class="shard-id">SDQM-041</span>
              <strong class="shard-title">Vox Underground</strong>
              <div class="shard-chip"></div>
            </button>

            <button class="shard-item" type="button" data-category="archive">
              <div class="shard-pins"><span></span><span></span><span></span><span></span><span></span></div>
              <span class="shard-id">SDQM-052</span>
              <strong class="shard-title">Après Minuit</strong>
              <div class="shard-chip"></div>
            </button>

          </div>
        </div>
      </section>

      <section class="contact-section" id="contact">
        <div class="contact-copy">
          <p class="eyebrow">Accès</p>
          <h2>Demande privée.</h2>
        </div>

        <form class="contact-form" id="contactForm">
          <label>
            <span>Nom</span>
            <input name="name" type="text" autocomplete="name" required>
          </label>

          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" required>
          </label>

          <label class="message-field">
            <span>Message</span>
            <textarea name="message" rows="4" required></textarea>
          </label>

          <label class="trap-field" aria-hidden="true">
            <span>Site web</span>
            <input name="website" type="text" tabindex="-1" autocomplete="off">
          </label>

          <button class="primary-link" type="submit">Envoyer</button>
          <p class="form-status" id="formStatus" role="status"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <span>© <span id="year"></span> Studios du Quatrième Mur</span>
    </footer>

    <script src="src/scripts/app.js"></script>
  </body>
</html>
